<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Guessing Game</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      margin: 0;
      height: 100vh;
      background: linear-gradient(-45deg, #ff6ec4, #7873f5, #4adede, #ff9a9e);
      background-size: 400% 400%;
      animation: gradientBG 12s ease infinite;
      color: #fff;
    }
    @keyframes gradientBG {
      0% {background-position:0% 50%}
      50% {background-position:100% 50%}
      100% {background-position:0% 50%}
    }
    h1 {
      font-size: 70px;
      font-weight: bold;
      margin-top: 60px;
      text-shadow: 0 0 20px #fff, 0 0 40px #ff00de, 0 0 80px #ff00de;
      animation: glow 2s ease-in-out infinite alternate, bounce 2s infinite;
    }
    @keyframes glow {
      from { text-shadow: 0 0 20px #fff, 0 0 40px #ff00de; }
      to { text-shadow: 0 0 40px #fff, 0 0 80px #00ffe7; }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    #startScreen, #game, #final, #leaderboard {
      margin-top: 40px;
      background: rgba(0,0,0,0.5);
      display: inline-block;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(255,255,255,0.4);
    }
    #game, #final, #leaderboard { display: none; }
    #puzzle {
      font-size: 36px;
      letter-spacing: 14px;
      margin: 20px;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.7);
    }
    input, select {
      padding: 10px;
      font-size: 18px;
      border-radius: 8px;
      border: none;
      margin: 10px;
    }
    button {
      padding: 10px 20px;
      font-size: 18px;
      margin: 10px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(45deg, #ff00de, #00ffe7);
      color: #fff;
      cursor: pointer;
      transition: transform 0.2s;
    }
    button:hover { transform: scale(1.1); }
    #message { margin-top: 20px; font-weight: bold; font-size: 20px; }
    #score, #timer, #round { margin: 10px; font-size: 20px; }
  </style>
</head>
<body>
  <h1>Guessing Game</h1>

  <!-- Start Screen -->
  <div id="startScreen">
    <h2>Enter Your Name</h2>
    <input type="text" id="playerName" placeholder="Your name">
    <h2>Select Difficulty</h2>
    <select id="difficulty">
      <option value="easy">Easy</option>
      <option value="medium">Medium</option>
      <option value="hard">Hard</option>
    </select>
    <br><br>
    <button id="startBtn">Start Game</button>
  </div>

  <!-- Game Screen -->
  <div id="game">
    <div id="round"></div>
    <div id="puzzle"></div>
    <input type="text" id="guess" placeholder="Type your guess & press Enter">
    <div id="message"></div>
    <div id="score"></div>
    <div id="timer"></div>
  </div>

  <!-- Final Result -->
  <div id="final"></div>

  <!-- Leaderboard -->
  <div id="leaderboard"></div>

  <script>
    const wordLists = {
      easy: ["Cat","Dog","Sun","Moon","Star","Ball","Book","Pen","Cup","Hat","Bed","Box","Toy","Car","Bus","Tree","Leaf","Fish","Bird","Cow","Pig","Hen","Egg","Ant","Bee","Rat","Bat","Fan","Man","Boy","Girl","Run","Sit","Eat","Red","Blue","Green","Hot","Cold","Big","Small","Top","Net","Log","Bag","Jam","Toy","Cap","Box","Cup"],
      medium: ["Apple","Banana","Orange","Grapes","Mango","School","Teacher","Student","Garden","River","Mountain","Bridge","House","Window","Door","Chair","Table","Street","Market","Village","City","Country","Family","Father","Mother","Brother","Sister","Friend","Happy","Sad","Angry","Laugh","Cry","Dance","Sing","Play","Jump","Walk","Drive","Train","Plane","Ship","Clock","Watch","Light","Dark","Water","Fire","Earth","Sky","Cloud","Rain"],
      hard: ["Adventure","Journey","Mystery","Courage","Freedom","Victory","Kingdom","Castle","Dragon","Wizard","Knight","Battle","Soldier","Captain","Pirate","Treasure","Ocean","Island","Desert","Forest","Village","Empire","Nation","Culture","History","Science","Library","Knowledge","Wisdom","Future","Galaxy","Planet","Rocket","Satellite","Energy","Power","Machine","Engine","Bridge","Tunnel","Tower","Palace","Market","Festival","Harvest","Expedition","Discovery","Invention","Creation","Imagination","Innovation"]
    };

    let wordPools = {};
    let round = 1;
    let score = 0;
    let timeLeft = 20;
    let timer;
    let word;
    const maxRounds = 30;
    let playerName = "";
    let leaderboard = JSON.parse(localStorage.getItem("leaderboard")) || [];
    let currentDifficulty = "easy";

    document.getElementById("startBtn").addEventListener("click", startGame);
    document.getElementById("guess").addEventListener("keydown", function(e) {
      if (e.key === "Enter") { checkGuess(); }
    });

    function startGame() {
      playerName = document.getElementById("playerName").value || "Player";
      currentDifficulty = document.getElementById("difficulty").value;
      wordPools = {
        easy: shuffleArray([...wordLists.easy]),
        medium: shuffleArray([...wordLists.medium]),
        hard: shuffleArray([...wordLists.hard])
      };
      document.getElementById("startScreen").style.display = "none";
      document.getElementById("game").style.display = "block";
      round = 1;
      score = 0;
      startRound();
    }

    function startRound() {
      word = getNextWord();
      if (!word) {
        endGame();
        return;
      }
      document.getElementById("puzzle").textContent = shuffle(word);
      document.getElementById("round").textContent = "Level: " + round + " / " + maxRounds + " | Difficulty: " + capitalize(currentDifficulty);
      document.getElementById("score").textContent = "Score: " + score;
      document.getElementById("message").textContent = "";
      document.getElementById("guess").value = "";
      resetTimer();
    }

    function shuffle(str) { return str.split('').sort(() => Math.random() - 0.5).join(''); }
    function shuffleArray(arr) { return arr.sort(() => Math.random() - 0.5); }

    function getNextWord() {
      const currentPool = wordPools[currentDifficulty] || [];
      if (currentPool.length === 0) return null;
      const index = Math.floor(Math.random() * currentPool.length);
      return currentPool.splice(index, 1)[0];
    }

    function capitalize(str) {
      return str.charAt(0).toUpperCase() + str.slice(1);
    }

    function areAnagrams(str1, str2) {
      return str1.length === str2.length &&
        str1.toUpperCase().split('').sort().join('') === str2.toUpperCase().split('').sort().join('');
    }

    function checkGuess() {
      const guess = document.getElementById("guess").value.trim().toUpperCase();
      if (areAnagrams(guess, word.toUpperCase())) {
        score += 10;
        document.getElementById("message").textContent = "🎉 Correct!";
        nextRound();
      } else {
        document.getElementById("message").textContent = "❌ Wrong! Try again.";
      }
      document.getElementById("guess").value = "";
    }

    function nextRound() {
      round++;
      if (round > maxRounds) {
        endGame();
      } else {
        startRound();
      }
    }

    function resetTimer() {
      clearInterval(timer);
      timeLeft = 20;
      updateTimer();
      timer = setInterval(updateTimer, 1000);
    }

    function updateTimer() {
      document.getElementById("timer").textContent = "Time: " + timeLeft + "s";
      if (timeLeft <= 0) {
        clearInterval(timer);
        document.getElementById("message").textContent = "⏱️ Time's up!";
        nextRound();
      }
      timeLeft--;
    }

    function endGame() {
      clearInterval(timer);
      document.getElementById("game").style.display = "none";
      document.getElementById("final").style.display = "block";
      
      leaderboard.push({ name: playerName, score: score, difficulty: currentDifficulty });
      leaderboard.sort((a, b) => b.score - a.score);
      leaderboard = leaderboard.slice(0, 10);
      localStorage.setItem("leaderboard", JSON.stringify(leaderboard));

      document.getElementById("final").innerHTML = `
        <h2>Game Over!</h2>
        <p><strong>${playerName}</strong>, your final score is <strong>${score}</strong> on ${capitalize(currentDifficulty)} difficulty!</p>
        <button onclick="location.reload()">Play Again</button>
        <button onclick="showLeaderboard()">View Leaderboard</button>
      `;
    }

    function showLeaderboard() {
      document.getElementById("final").style.display = "none";
      document.getElementById("leaderboard").style.display = "block";
      
      let leaderboardHTML = "<h2>🏆 Leaderboard</h2><table style='width:100%; color:#fff; border-collapse: collapse;'>";
      leaderboardHTML += "<tr style='border-bottom: 2px solid #fff;'><th>Rank</th><th>Name</th><th>Score</th><th>Difficulty</th></tr>";
      
      leaderboard.forEach((entry, index) => {
        leaderboardHTML += `<tr style='border-bottom: 1px solid rgba(255,255,255,0.3);'><td>${index + 1}</td><td>${entry.name}</td><td>${entry.score}</td><td>${capitalize(entry.difficulty)}</td></tr>`;
      });
      
      leaderboardHTML += "</table><br><button onclick='location.reload()'>Back to Start</button>";
      document.getElementById("leaderboard").innerHTML = leaderboardHTML;
    }
  </script>
</body>
</html>
